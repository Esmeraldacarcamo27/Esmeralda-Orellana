<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Esmeralda Orellana</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:white;
}

/* MENU */

header{
background:#014d40;

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 50px;
}

.logo{
width:120px;
}
}

nav a{
color:white;
text-decoration:none;
margin-left:30px;
font-weight:bold;
}

/* TITULO */

.hero{
text-align:center;
margin-top:120px;
}

.hero h1{
font-size:90px;
color:#00b894;
}

/* BOTONES */

.botones{
margin-top:40px;
}

.botones button{

padding:15px 25px;

margin:10px;

border:2px solid #00b894;

background:white;

color:#014d40;

border-radius:12px;

font-weight:bold;

cursor:pointer;

transition:0.3s;
}

.botones button:hover{
background:#00b894;
color:white;
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<nav>
<a href="#">PROYECTOS</a>
<a href="#">CONTÁCTAME</a>
</nav>

</header>

<section class="hero">

<h1>PROYECTOS</h1>

<div class="botones">

<div class="botones">

<button>DISEÑO</button>
<button>VIDEOS</button>
<button>REELS</button>

</div>

</div>

</section>

</body>
</html>
